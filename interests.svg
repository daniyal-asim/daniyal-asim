<svg width="100%" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bar-fill { animation: grow 1.8s ease-out forwards; transform-origin: left; }
      @keyframes grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      .b1 { animation-delay: 0.1s; }
      .b2 { animation-delay: 0.3s; }
      .b3 { animation-delay: 0.5s; }
      .b4 { animation-delay: 0.7s; }
      .b5 { animation-delay: 0.9s; }
      .b6 { animation-delay: 1.1s; }
      .bar-fill { transform: scaleX(0); }
      .label { font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #e0e0e0; }
      .pct   { font-family: 'Segoe UI', sans-serif; font-size: 12px; fill: #aaaaaa; }
    </style>
  </defs>

  <!-- Row 1: Robotics -->
  <text class="label" x="14" y="34">Robotics</text>
  <rect x="140" y="18" width="460" height="22" rx="6" fill="#1a1a2e" opacity="0.6"/>
  <rect class="bar-fill b1" x="140" y="18" width="345" height="22" rx="6" fill="#FF006E"/>
  <text class="pct" x="494" y="34">75%</text>

  <!-- Row 2: LLMs & AI -->
  <text class="label" x="14" y="78">LLMs &amp; AI</text>
  <rect x="140" y="62" width="460" height="22" rx="6" fill="#1a1a2e" opacity="0.6"/>
  <rect class="bar-fill b2" x="140" y="62" width="299" height="22" rx="6" fill="#00F5FF"/>
  <text class="pct" x="448" y="78">65%</text>

  <!-- Row 3: Embedded Systems -->
  <text class="label" x="14" y="122">Embedded Sys.</text>
  <rect x="140" y="106" width="460" height="22" rx="6" fill="#1a1a2e" opacity="0.6"/>
  <rect class="bar-fill b3" x="140" y="106" width="322" height="22" rx="6" fill="#00FF87"/>
  <text class="pct" x="471" y="122">70%</text>

  <!-- Row 4: Fun Projects -->
  <text class="label" x="14" y="166">Fun Projects</text>
  <rect x="140" y="150" width="460" height="22" rx="6" fill="#1a1a2e" opacity="0.6"/>
  <rect class="bar-fill b4" x="140" y="150" width="368" height="22" rx="6" fill="#FFBE0B"/>
  <text class="pct" x="517" y="166">80%</text>

  <!-- Row 5: Python -->
  <text class="label" x="14" y="210">Python</text>
  <rect x="140" y="194" width="460" height="22" rx="6" fill="#1a1a2e" opacity="0.6"/>
  <rect class="bar-fill b5" x="140" y="194" width="368" height="22" rx="6" fill="#8338EC"/>
  <text class="pct" x="517" y="210">80%</text>

  <!-- Row 6: C++ -->
  <text class="label" x="14" y="254">C++</text>
  <rect x="140" y="238" width="460" height="22" rx="6" fill="#1a1a2e" opacity="0.6"/>
  <rect class="bar-fill b6" x="140" y="238" width="322" height="22" rx="6" fill="#FB5607"/>
  <text class="pct" x="471" y="254">70%</text>

</svg>
